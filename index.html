<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="description" content="Hey USA — אפליקציית מסע משפחתית לטיול בארה״ב. ניהול לוח זמנים, תקציב, משימות, מסמכים ועוד." />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#F5F0EB" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Hey USA" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=DM+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
    <title>Hey USA 🇺🇸</title>
    <!-- GitHub Pages SPA redirect handler -->
    <script>
      (function(){
        var redirect = sessionStorage.redirect;
        delete sessionStorage.redirect;
        if (redirect && redirect !== location.href) {
          history.replaceState(null, null, redirect);
        }
      })();
      // Handle 404.html redirect
      (function(){
        var l = window.location;
        if (l.search[1] === '/') {
          var decoded = l.search.slice(1).split('&').map(function(s) {
            return s.replace(/~and~/g, '&')
          }).join('?');
          window.history.replaceState(null, null,
            l.pathname.slice(0, -1) + decoded + l.hash
          );
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <!-- Pre-React splash: eliminates gray flash while JS loads -->
    <div id="pre-splash" style="
      position: fixed; inset: 0; z-index: 9999;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      background: linear-gradient(170deg, #1e293b 0%, #0f172a 60%, #92400e 100%);
      transition: opacity 0.3s ease-out;
    ">
      <div style="
        width: 80px; height: 80px; border: 2.5px solid rgba(217, 119, 6, 0.7);
        border-radius: 50%; display: flex; align-items: center; justify-content: center;
        margin-bottom: 20px; position: relative;
      ">
        <div style="
          position: absolute; inset: 4px; border: 1px dashed rgba(217, 119, 6, 0.35);
          border-radius: 50%;
        "></div>
        <span style="font-size: 0.65rem; font-weight: 700; color: #d97706; letter-spacing: 0.15em; text-transform: uppercase; font-family: 'Playfair Display', serif;">USA</span>
      </div>
      <h1 style="
        font-size: 3rem; font-weight: 700; color: #FAF8F5;
        letter-spacing: -0.02em; margin: 0;
        font-family: 'Playfair Display', serif;
      ">Hey USA</h1>
      <p style="
        font-size: 1rem; color: rgba(250,248,245,0.5);
        margin-top: 8px; font-family: 'DM Sans', system-ui, sans-serif;
      ">&#x1F468;&#x200D;&#x1F469;&#x200D;&#x1F467;&#x200D;&#x1F466; משפחה בדרכים</p>
      <p style="
        margin-top: 28px; font-size: 0.65rem;
        letter-spacing: 0.2em; color: rgba(217, 119, 6, 0.5);
        font-family: 'DM Sans', sans-serif; text-transform: uppercase;
      ">CO &bull; MT &bull; WY &bull; UT &bull; NV &bull; CA</p>
    </div>
    <script>
      // Remove pre-splash once React mounts (SplashScreen takes over)
      var observer = new MutationObserver(function() {
        var root = document.getElementById('root');
        if (root && root.children.length > 0) {
          var pre = document.getElementById('pre-splash');
          if (pre) {
            pre.style.opacity = '0';
            setTimeout(function() { pre.remove(); }, 300);
          }
          observer.disconnect();
        }
      });
      observer.observe(document.getElementById('root'), { childList: true });
      // Fallback: remove after 5s even if observer fails
      setTimeout(function() {
        var pre = document.getElementById('pre-splash');
        if (pre) { pre.style.opacity = '0'; setTimeout(function() { pre.remove(); }, 300); }
      }, 5000);
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
